name: Testes php

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist

      - name: Executar SomaTest
        id: testes
        run: vendor/bin/phpunit tests/SomaTest.php
        continue-on-error: true

      - name: Criar issue se o teste falhou
        if: steps.testes.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Falha no teste SomaTest',
              body: `O teste **SomaTest.php** falhou na execução do pipeline.\n\n` +
                    `- **Branch:** \`${context.ref}\`\n` +
                    `- **Commit:** \`${context.sha.substring(0, 7)}\`\n` +
                    `- **Autor:** ${context.actor}\n` +
                    `- **Workflow:** [Ver execução](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`,
              labels: ['bug', 'testes']
            });

      - name: Falhar o pipeline
        if: steps.testes.outcome == 'failure'
        run: exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configurar Github Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


